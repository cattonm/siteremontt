<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Анкета Об'єкту</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ЗМІННІ ДЛЯ КОЛЬОРІВ (Світла тема) */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #1c1c1e;
            --hint-color: #8e8e93;
            --link-color: #007aff;
            --secondary-bg: #ffffff;
            --card-bg: #ffffff;
            --border-color: #e5e5ea;
            --zone-badge-bg: #e5e5ea;
            --modal-bg: #ffffff;
            --shadow-color: rgba(0,0,0,0.05);
        }

        /* ЗМІННІ ДЛЯ ТЕМНОЇ ТЕМИ */
        body.dark-theme {
            --bg-color: #000000;
            --text-color: #ffffff;
            --hint-color: #ebebf5;
            --link-color: #0a84ff;
            --secondary-bg: #1c1c1e;
            --card-bg: #1c1c1e;
            --border-color: #38383a;
            --zone-badge-bg: #38383a;
            --modal-bg: #1c1c1e;
            --shadow-color: rgba(0,0,0,0.3);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; padding-bottom: 220px; margin: 0; background: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; overflow-x: hidden;}
        .hidden { display: none !important; }
        
        #top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--secondary-bg); padding: 12px 15px; border-radius: 16px; box-shadow: 0 4px 12px var(--shadow-color); margin-bottom: 15px; transition: 0.3s; }
        #menu-btn { font-size: 16px; font-weight: 600; cursor: pointer; color: var(--link-color); display: flex; align-items: center; gap: 8px;}
        #step-count { color: var(--hint-color); font-size: 14px; font-weight: 600; }
        
        /* PROGRESS BAR */
        #progress-container { width: 100%; height: 6px; background: var(--border-color); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--link-color); width: 0%; transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); border-radius: 3px;}

        /* ANIMATED STEP CONTENT */
        .animated-step { animation: slideInRight 0.35s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        /* SKELETON LOADER */
        .skeleton-wrapper { display: flex; flex-direction: column; gap: 15px; padding-top: 20px;}
        .skeleton { border-radius: 12px; animation: pulse 1.5s infinite ease-in-out; }
        .sk-title { height: 28px; width: 60%; margin-bottom: 10px; }
        .sk-input { height: 50px; width: 100%; }
        .sk-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;}
        .sk-card { height: 140px; width: 100%; border-radius: 16px;}
        body.dark-theme .skeleton { background-color: #2c2c2e; }
        body:not(.dark-theme) .skeleton { background-color: #e5e5ea; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* MENU AND BOTTOM SHEETS */
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(2px); }
        .sheet-overlay.open { opacity: 1; pointer-events: auto; }
        
        #side-menu { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: var(--modal-bg); box-shadow: 4px 0 24px rgba(0,0,0,0.15); z-index: 3000; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); overflow-y: auto; padding-top: 20px; }
        #side-menu.open { transform: translateX(0); }
        
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--modal-bg); border-radius: 24px 24px 0 0; box-shadow: 0 -4px 24px rgba(0,0,0,0.15); z-index: 4000; transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 20px; box-sizing: border-box; max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column;}
        .bottom-sheet.open { bottom: 0; }
        .drag-handle { width: 40px; height: 5px; background: var(--hint-color); border-radius: 3px; margin: 0 auto 15px auto; opacity: 0.5; }

        .menu-header { padding: 0 20px 15px 20px; font-size: 20px; font-weight: 700; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; color: var(--text-color);}
        .menu-item { padding: 14px 20px; border-bottom: 1px solid var(--border-color); font-weight: 500; color: var(--text-color); cursor: pointer; transition: background 0.2s;}
        .menu-item:active { background: var(--border-color); }
        
        .zone-badge { display: inline-block; background: var(--zone-badge-bg); color: var(--hint-color); padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.5px; }
        h3 { margin: 0 0 20px 0; font-size: 22px; font-weight: 700; line-height: 1.3; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 15px; color: var(--text-color); }
        
        /* INPUTS & VALIDATION */
        input[type="text"], input[type="tel"], input[type="number"], select { width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid var(--border-color); font-size: 16px; margin-bottom: 20px; box-sizing: border-box; background: var(--secondary-bg); color: var(--text-color); transition: all 0.2s; outline: none;}
        input:focus, select:focus { border-color: var(--link-color); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); }
        
        .input-error { border-color: #ff3b30 !important; background-color: rgba(255, 59, 48, 0.08) !important; animation: shake 0.4s 1; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }

        /* CUPERTINO CARDS */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .card { border: 1.5px solid var(--border-color); border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; background: var(--card-bg); box-shadow: 0 4px 12px var(--shadow-color); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .card:active { transform: scale(0.96); }
        .card.selected { border-color: var(--link-color); background: rgba(10, 132, 255, 0.08); box-shadow: 0 4px 16px rgba(10, 132, 255, 0.15); }
        .img-wrapper { position: relative; width: 100%; height: 110px; margin-bottom: 10px; border-radius: 10px; overflow: hidden;}
        .card img { width: 100%; height: 100%; object-fit: cover; background-color: var(--secondary-bg); }
        .zoom-icon { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); color: white; padding: 4px 8px; border-radius: 20px; font-size: 13px; cursor: pointer; z-index: 10; transition: background 0.2s; backdrop-filter: blur(4px);}
        .card-label { font-weight: 500; font-size: 14px; }

        /* SEGMENTED CONTROL TIERS */
        .tier-container { display: flex; background: var(--zone-badge-bg); border-radius: 8px; padding: 3px; margin-top: 10px; width: 100%; box-sizing: border-box;}
        .tier-btn { flex: 1; padding: 8px 0; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--hint-color); text-align: center; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .tier-btn.active { background: var(--card-bg); color: var(--text-color); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; transition: background 0.2s; border-radius: 12px; margin-bottom: 5px; background: var(--secondary-bg); box-shadow: 0 2px 8px var(--shadow-color);}
        .list-item:active { transform: scale(0.98); }
        .list-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--link-color); transform: scale(1.1);}
        
        #image-sheet img { max-width: 100%; border-radius: 16px; max-height: 60vh; object-fit: contain; margin: 0 auto; display: block;}

        .measurement-box { background: var(--secondary-bg); padding: 18px; border-radius: 16px; border: 1.5px solid var(--border-color); margin-bottom: 15px; box-shadow: 0 4px 12px var(--shadow-color); transition: 0.3s; }
        
        /* BOTTOM NAVBAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-color); padding: 15px 20px 25px 20px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; box-sizing: border-box; z-index: 100; transition: 0.3s; padding-bottom: max(20px, env(safe-area-inset-bottom));}
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-back { background: var(--secondary-bg); color: var(--text-color); flex: 0.3; border: 1.5px solid var(--border-color); }
        .btn-next { background: var(--link-color); color: #fff; box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);}
        .btn-submit { background: #34c759 !important; color: #fff !important; box-shadow: 0 4px 14px rgba(52, 199, 89, 0.3) !important; font-size: 18px !important; }
        
        /* CART */
        #live-cart { position: fixed; bottom: 90px; left: 15px; right: 15px; background: rgba(28, 28, 30, 0.95); color: #fff; padding: 14px 18px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 99; display: flex; justify-content: space-between; align-items: center; font-size: 14px; cursor: pointer; backdrop-filter: blur(10px); transition: opacity 0.3s, transform 0.2s; opacity: 0; pointer-events: none;}
        #live-cart:active { transform: scale(0.97); }
        #live-cart.visible { opacity: 1; pointer-events: auto; }
        #live-cart div { display: flex; flex-direction: column; }
        #live-cart span.cart-val { color: #34c759; font-weight: 700; font-size: 17px;}
        
        .cart-close-btn { background: var(--zone-badge-bg); color: var(--text-color); border: none; padding: 12px; border-radius: 12px; font-weight: 600; width: 100%; margin-top: 15px; cursor: pointer;}
        .cart-list { margin-top: 10px; font-size: 15px; line-height: 1.6; }
        .cart-zone-title { font-weight: 700; color: var(--link-color); margin-top: 20px; border-bottom: 1.5px solid var(--border-color); padding-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;}

        /* SUMMARY SCREEN */
        .summary-box { background: var(--secondary-bg); border-radius: 16px; padding: 15px 20px; border: 1.5px solid var(--border-color); margin-bottom: 15px; box-shadow: 0 4px 12px var(--shadow-color); animation: slideInRight 0.3s forwards;}
        .summary-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); align-items: center; font-size: 15px;}
        .summary-item:last-child { border-bottom: none; padding-bottom: 0; }
        .edit-btn { color: var(--link-color); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: rgba(10,132,255,0.1); border-radius: 8px; transition: transform 0.1s;}
        .edit-btn:active { transform: scale(0.92); }
    </style>
</head>
<body>
<script> const BACKEND_URL = "https://remontnikuav.onrender.com"; </script>

<div id="sheet-overlay" class="sheet-overlay" onclick="closeAllSheets()"></div>
<div id="menu-overlay" class="sheet-overlay" onclick="toggleMenu()"></div>

<div id="image-sheet" class="bottom-sheet">
    <div class="drag-handle"></div>
    <img id="modalImg" src="">
    <button class="cart-close-btn" onclick="closeImage()">Закрити</button>
</div>

<div id="cart-sheet" class="bottom-sheet">
    <div class="drag-handle"></div>
    <h3 style="margin-bottom: 5px;">Ваш вибір</h3>
    <p style="color: var(--hint-color); font-size: 13px; margin-top:0;">Актуальний розрахунок кошика.</p>
    <div class="cart-list" id="cart-list-content"></div>
    <button class="cart-close-btn" onclick="closeCartSheet()">Закрити кошик</button>
</div>

<div id="side-menu">
    <div class="menu-header">📋 Розділи анкети</div>
    <div id="menu-list"></div>
</div>

<div id="loading-screen" class="hidden">
    <div class="skeleton-wrapper">
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-input"></div>
        <div class="skeleton sk-input"></div>
        <div class="skeleton sk-title" style="margin-top: 10px; width: 40%;"></div>
        <div class="sk-card-grid">
            <div class="skeleton sk-card"></div><div class="skeleton sk-card"></div>
            <div class="skeleton sk-card"></div><div class="skeleton sk-card"></div>
        </div>
    </div>
</div>

<div id="live-cart" onclick="openCartSheet()">
    <div><span style="font-size:12px; color:#aaa; font-weight:500;">Робота</span><span class="cart-val" id="cart-work">0 ₴</span></div>
    <div><span style="font-size:12px; color:#aaa; font-weight:500;">Матеріали (від)</span><span class="cart-val" id="cart-mat">0 ₴</span></div>
    <div style="font-size: 24px;">🛒</div>
</div>

<div id="section-client" class="animated-step">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0;">👷 Інформація про об'єкт</h3>
        <div id="theme-toggle-client" onclick="toggleTheme()" style="cursor: pointer; font-size: 22px; user-select: none;">🌙</div>
    </div>
    <label>Ім'я клієнта</label> <input type="text" id="clientName" placeholder="Введіть ім'я">
    <label>Телефон</label> <input type="tel" id="clientPhone" inputmode="tel" placeholder="+380 (XX) XXX-XX-XX">
    <label>Тип об'єкту</label><select id="objectType"><option value="Квартира (Новобудова)">Квартира (Новобудова)</option><option value="Квартира (Вторинна)">Квартира (Вторинна)</option><option value="Будинок">Будинок</option><option value="Комерція">Комерція</option></select>
    <label>Адреса</label> <input type="text" id="clientAddress" placeholder="Вулиця / ЖК">
    <label>Загальна площа об'єкта (м²)</label> <input type="number" inputmode="decimal" id="clientArea" placeholder="Наприклад: 65">
    <div style="display: flex; gap: 10px;"><div style="flex: 1;"><label>Поверх</label> <input type="number" inputmode="numeric" id="clientFloor" placeholder="1" value="1"></div>
    <div style="flex: 1;"><label>Ліфт</label><select id="clientElevator"><option value="Вантажний">Вантажний</option><option value="Пасажирський">Пасажирський</option><option value="Немає">Немає</option></select></div></div>
</div>

<div id="section-questions" class="hidden">
    <div id="top-bar">
        <div id="menu-btn" onclick="toggleMenu()">☰ Меню</div>
        <div id="return-to-summary-btn" class="hidden" onclick="forceReturnToSummary()" style="background: var(--link-color); color: white; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(0,122,255,0.3);">🔙 До підсумку</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="theme-toggle-questions" onclick="toggleTheme()" style="cursor: pointer; font-size: 18px; user-select: none;">🌙</div>
            <div id="step-count">1/X</div>
        </div>
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="question-container"></div>
</div>

<div id="section-measurements" class="hidden animated-step">
    <h3 style="margin-bottom: 5px;">📏 Точні заміри приміщень</h3>
    <p style="color: var(--hint-color); font-size: 14px; margin-top: 0px; margin-bottom: 20px;">Введіть точні дані, щоб калькулятор працював ідеально.</p>
    <div id="measurements-container"></div>
</div>

<div id="section-summary" class="hidden animated-step">
    <h3 style="margin-bottom: 5px;">✅ Перевірка даних</h3>
    <p style="color: var(--hint-color); font-size: 14px; margin-top: 0px; margin-bottom: 20px;">Перевірте зібраний кошторис перед відправкою.</p>
    <div id="summary-container"></div>
</div>

<div id="section-thankyou" class="hidden animated-step"></div>

<div class="nav-bar" id="navBar">
    <button type="button" class="btn btn-back" onclick="goBack()" id="btnBack" style="display:none;">←</button>
    <button type="button" class="btn btn-next" onclick="goNext()" id="btnNext">Далі</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // === КОНТРОЛЕР ЕКРАНІВ (ЗАХИСТ ВІД НАКЛАДАННЯ) ===
    function showSection(sectionId) {
        ['loading-screen', 'section-client', 'section-questions', 'section-measurements', 'section-summary', 'section-thankyou'].forEach(id => {
            let el = document.getElementById(id);
            if (el) el.classList.add('hidden');
        });
        document.getElementById(sectionId).classList.remove('hidden');
        
        if (sectionId === 'section-questions' || sectionId === 'section-measurements') {
            document.getElementById('live-cart').classList.add('visible');
        } else {
            document.getElementById('live-cart').classList.remove('visible');
        }
    }

    // HAPTIC FEEDBACK
    function vibe(type = 'light') { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type); }
    function vibeSelect() { if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged(); }
    function vibeError() { if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); }

    // ТЕМА
    function applySavedTheme() {
        const savedTheme = localStorage.getItem('remont_theme');
        const iconClient = document.getElementById('theme-toggle-client');
        const iconQuestions = document.getElementById('theme-toggle-questions');
        if (savedTheme === 'dark') { document.body.classList.add('dark-theme'); if (iconClient) iconClient.innerText = '☀️'; if (iconQuestions) iconQuestions.innerText = '☀️'; } 
        else { document.body.classList.remove('dark-theme'); if (iconClient) iconClient.innerText = '🌙'; if (iconQuestions) iconQuestions.innerText = '🌙'; }
    }
    function toggleTheme() {
        vibe('medium');
        const isDark = document.body.classList.toggle('dark-theme');
        const iconClient = document.getElementById('theme-toggle-client');
        const iconQuestions = document.getElementById('theme-toggle-questions');
        if (isDark) { localStorage.setItem('remont_theme', 'dark'); if (iconClient) iconClient.innerText = '☀️'; if (iconQuestions) iconQuestions.innerText = '☀️'; } 
        else { localStorage.setItem('remont_theme', 'light'); if (iconClient) iconClient.innerText = '🌙'; if (iconQuestions) iconQuestions.innerText = '🌙'; }
    }
    applySavedTheme();

    // МАСКА ТЕЛЕФОНУ
    document.getElementById('clientPhone').addEventListener('input', function(e) {
        let digits = e.target.value.replace(/\D/g, '');
        if (digits.startsWith('380')) digits = digits.substring(3);
        else if (digits.startsWith('80')) digits = digits.substring(2);
        else if (digits.startsWith('0')) digits = digits.substring(1);
        let res = '+380';
        if (digits.length > 0) res += ' (' + digits.substring(0, 2);
        if (digits.length >= 3) res += ') ' + digits.substring(2, 5);
        if (digits.length >= 6) res += '-' + digits.substring(5, 7);
        if (digits.length >= 8) res += '-' + digits.substring(7, 9);
        e.target.value = res;
    });

    let answers = {}; 
    let currentStep = -1; 
    let finalQuestions = []; 
    let editId = null; 
    let calcTimeout = null;
    let currentTotalWork = 0;
    let currentTotalMat = 0;
    let isEditingFromSummary = false; 

    // БАЗА ПИТАНЬ
    const blockSetup = [
        { id: "rooms_count", zone: "СТРУКТУРА ОБ'ЄКТУ", text: "Скільки ЖИТЛОВИХ кімнат?", type: "input_number", placeholder: "Введіть число" },
        { id: "baths_count", zone: "СТРУКТУРА ОБ'ЄКТУ", text: "Скільки САНВУЗЛІВ?", type: "input_number", placeholder: "Введіть число" },
        { id: "aux_rooms", zone: "СТРУКТУРА ОБ'ЄКТУ", text: "Які ДОДАТКОВІ приміщення ремонтуємо?", type: "cards_multiselect", options: [
            {label:"Передпокій",val:"Передпокій"}, {label:"Кухня",val:"Кухня"}, {label:"Балкон",val:"Балкон"},
            {label:"Гардероб",val:"Гардероб"}, {label:"Підвал",val:"Підвал"}, {label:"Горище",val:"Горище"}
        ]}
    ];

    const blockTriggerMeas = [ { id: "trigger_meas", zone: "ЗАМІРИ ПРИМІЩЕНЬ", text: "", type: "trigger_meas" } ];

    const blockDemolition = [
        { id: "demo_entrance", zone: "ДЕМОНТАЖ / МОНТАЖ", text: "Демонтаж старих вхідних дверей?", type: "cards", options: [{label:"Так",val:"Так"},{label:"Ні",val:"Ні"}] },
        { id: "demo_interior", zone: "ДЕМОНТАЖ / МОНТАЖ", text: "Скільки міжкімнатних дверей демонтуємо?", type: "input_number", placeholder: "Впишіть кількість (шт) або 0" },
        { id: "demo_build_walls", zone: "ДЕМОНТАЖ / МОНТАЖ", text: "Перепланування стін (Впишіть м²)", type: "multi_input_number", options: [
            {label:"Демонтаж існуючих стін"}, {label:"Монтаж: Гіпсокартон"}, {label:"Монтаж: Цегла (1/2)"}, {label:"Монтаж: Газоблок"}
        ]},
        { id: "demo_floor", zone: "ДЕМОНТАЖ / МОНТАЖ", text: "Демонтаж підлоги (Впишіть м²)", type: "multi_input_number", options: [
            {label:"Паркет / Дерев'яна"}, {label:"Лінолеум / Ламінат"}, {label:"Стара стяжка"}
        ]}

    function cleanupOldAnswers() {
        const rooms = parseInt(answers['rooms_count']) || 0;
        const baths = parseInt(answers['baths_count']) || 0;
        const aux = answers['aux_rooms'] || [];
        
        Object.keys(answers).forEach(key => {
            if (key.startsWith('room_')) { const num = parseInt(key.split('_')[1]); if (num > rooms) delete answers[key]; }
            if (key.startsWith('bath_')) { const num = parseInt(key.split('_')[1]); if (num > baths) delete answers[key]; }
        });
        
        const zonePrefixes = { 'hallway': 'Передпокій', 'kitchen': 'Кухня', 'balcony': 'Балкон', 'wardrobe': 'Гардероб', 'basement': 'Підвал', 'attic': 'Горище' };
        Object.keys(answers).forEach(key => {
            for (let [prefix, zone] of Object.entries(zonePrefixes)) {
                if (key.startsWith(prefix + '_') && !aux.includes(zone)) { delete answers[key]; break; }
            }
        });

        if (answers.measurements) {
            Object.keys(answers.measurements).forEach(zoneId => {
                if (zoneId.startsWith('room_')) { const num = parseInt(zoneId.split('_')[1]); if (num > rooms) delete answers.measurements[zoneId]; }
                if (zoneId.startsWith('bath_')) { const num = parseInt(zoneId.split('_')[1]); if (num > baths) delete answers.measurements[zoneId]; }
                const zonePrefixesRev = { 'hallway': 'Передпокій', 'kitchen': 'Кухня', 'balcony': 'Балкон', 'wardrobe': 'Гардероб', 'basement': 'Підвал', 'attic': 'Горище' };
                if (zonePrefixesRev[zoneId] && !aux.includes(zonePrefixesRev[zoneId])) {
                    delete answers.measurements[zoneId];
                }
            });
        }
    }

        function shouldSkip(q) {
        if (!q) return false;
        if (q.id === 'ceiling_shadow' && answers['ceiling'] === 'Ні') return true;
        // Пропускаємо площу стяжки, якщо стяжка не потрібна або від забудовника
        if (q.id === 'screed_area' && (!answers['screed_done'] || answers['screed_done'] === 'Є від забудовника')) return true;
        const aux = answers['aux_rooms'] || [];
        if (q.id.startsWith('hallway_') && !aux.includes('Передпокій')) return true;
        if (q.id.startsWith('kitchen_') && !aux.includes('Кухня')) return true;
        if (q.id.startsWith('balcony_') && !aux.includes('Балкон')) return true;
        if (q.id.startsWith('wardrobe_') && !aux.includes('Гардероб')) return true;
        if (q.id.startsWith('basement_') && !aux.includes('Підвал')) return true;
        if (q.id.startsWith('attic_') && !aux.includes('Горище')) return true;
        return false;
    }

    // АНІМАЦІЯ ЦИФР
    function animateValue(obj, start, end, duration) {
        if (!obj) return;
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 4);
            const currentVal = Math.floor(ease * (end - start) + start);
            obj.innerHTML = currentVal.toLocaleString() + ' ₴';
            if (progress < 1) { window.requestAnimationFrame(step); } 
            else { obj.innerHTML = end.toLocaleString() + ' ₴'; }
        };
        window.requestAnimationFrame(step);
    }

    async function fetchLiveCalc() {
        if(!navigator.onLine) return; 
        const area = parseFloat(document.getElementById('clientArea').value) || 0;
        if(area <= 0) return;
        const data = { client: { area: area, floor: document.getElementById('clientFloor').value, elevator: document.getElementById('clientElevator').value }, answers: answers };
        try {
            const res = await fetch(`${BACKEND_URL}/api/live_calc`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            if (!res.ok) throw new Error(`HTTP error ${res.status}`);
            const p = await res.json();
            if(p.work !== undefined) {
                animateValue(document.getElementById('cart-work'), currentTotalWork, p.work, 600);
                animateValue(document.getElementById('cart-mat'), currentTotalMat, p.mat_min, 600);
                
                const sumWork = document.getElementById('summary-total-work');
                const sumMat = document.getElementById('summary-total-mat');
                if (sumWork) animateValue(sumWork, currentTotalWork, p.work, 600);
                if (sumMat) animateValue(sumMat, currentTotalMat, p.mat_min, 600);

                currentTotalWork = p.work;
                currentTotalMat = p.mat_min;
            }
        } catch(e) {}
    }

    function getUnansweredCount() {
        let count = 0;
        let measIndex = finalQuestions.findIndex(q => q.type === 'trigger_meas');
        if (measIndex !== -1) {
            const aux = answers['aux_rooms'] || [];
            const rooms = parseInt(answers['rooms_count']) || 0;
            const baths = parseInt(answers['baths_count']) || 0;
            let meas = answers.measurements || {};
            const reqZones = [];
            for(let i=1; i<=rooms; i++) reqZones.push(`room_${i}`);
            for(let i=1; i<=baths; i++) reqZones.push(`bath_${i}`);
            aux.forEach(a => {
                const zMap = {'Передпокій':'hallway', 'Кухня':'kitchen', 'Балкон':'balcony', 'Гардероб':'wardrobe', 'Підвал':'basement', 'Горище':'attic'};
                if(zMap[a]) reqZones.push(zMap[a]);
            });
            
            for(let z of reqZones) {
                if(!meas[z] || meas[z].floor === '' || meas[z].floor === undefined || meas[z].walls === '' || meas[z].walls === undefined) {
                    count++; break; 
                }
            }
        }

        for(let i = 0; i < finalQuestions.length; i++) {
            if (shouldSkip(finalQuestions[i])) continue;
            if (finalQuestions[i].type === 'trigger_meas' || finalQuestions[i].type === 'custom_works_builder') continue;
            
            let val = answers[finalQuestions[i].id];
            let isAnswered = true;
            if (val === undefined || val === null || val === "") isAnswered = false;
            else if (Array.isArray(val) && val.length === 0) isAnswered = false;
            
            if (!isAnswered) count++;
        }
        return count;
    }

    function renderMeasurements() {

        document.getElementById('btnNext').classList.remove('btn-submit');
        document.getElementById('btnNext').onclick = goNext; 
        document.getElementById('btnBack').onclick = goBack;

        if (aux.includes('Передпокій')) zones.push({id: 'hallway', name: 'Передпокій'}); if (aux.includes('Кухня')) zones.push({id: 'kitchen', name: 'Кухня'}); if (aux.includes('Балкон')) zones.push({id: 'balcony', name: 'Балкон'}); if (aux.includes('Гардероб')) zones.push({id: 'wardrobe', name: 'Гардероб'}); if (aux.includes('Підвал')) zones.push({id: 'basement', name: 'Підвал'}); if (aux.includes('Горище')) zones.push({id: 'attic', name: 'Горище'});
        const roomsCount = answers['rooms_count'] || 0; for(let i=1; i<=roomsCount; i++) zones.push({id: `room_${i}`, name: `Кімната ${i}`});
        const bathsCount = answers['baths_count'] || 0; for(let i=1; i<=bathsCount; i++) zones.push({id: `bath_${i}`, name: `Санвузол ${i}`});

    function editStep(index) {
        vibe('light');
        isEditingFromSummary = true;
        document.getElementById('btnNext').classList.remove('btn-submit');
        document.getElementById('btnNext').onclick = goNext;
        
        if (index === -1) {
            currentStep = -1; showSection('section-client');
            document.getElementById('btnBack').style.display = 'none';
        } else {
            currentStep = index;
            const q = finalQuestions[index];
            if (q.type === 'trigger_meas') renderMeasurements(); else renderQuestion();
        }
        updateNextButton();
    }

    function routeToNextUnansweredOrSummary() {
        let nextUnanswered = -1;
        
        let measIndex = finalQuestions.findIndex(q => q.type === 'trigger_meas');
        if (measIndex !== -1) {
            const aux = answers['aux_rooms'] || [];
            const rooms = parseInt(answers['rooms_count']) || 0;
            const baths = parseInt(answers['baths_count']) || 0;
            let meas = answers.measurements || {};
            const reqZones = [];
            for(let i=1; i<=rooms; i++) reqZones.push(`room_${i}`);
            for(let i=1; i<=baths; i++) reqZones.push(`bath_${i}`);
            aux.forEach(a => {
                const zMap = {'Передпокій':'hallway', 'Кухня':'kitchen', 'Балкон':'balcony', 'Гардероб':'wardrobe', 'Підвал':'basement', 'Горище':'attic'};
                if(zMap[a]) reqZones.push(zMap[a]);
            });
            
            for(let z of reqZones) {
                if(!meas[z] || meas[z].floor === '' || meas[z].floor === undefined || meas[z].walls === '' || meas[z].walls === undefined) {
                    nextUnanswered = measIndex; break;
                }
            }
        }

        if (nextUnanswered === -1) {
            for(let i = 0; i < finalQuestions.length; i++) {
                if (shouldSkip(finalQuestions[i])) continue;
                if (finalQuestions[i].type === 'trigger_meas' || finalQuestions[i].type === 'custom_works_builder') continue;
                
                let val = answers[finalQuestions[i].id];
                let isAnswered = true;
                if (val === undefined || val === null || val === "") isAnswered = false;
                else if (Array.isArray(val) && val.length === 0) isAnswered = false;
                
                if (!isAnswered) { nextUnanswered = i; break; }
            }
        }

        if (nextUnanswered !== -1) {
            currentStep = nextUnanswered;
            if (finalQuestions[currentStep].type === 'trigger_meas') renderMeasurements(); else renderQuestion();
        } else {
            isEditingFromSummary = false;
            currentStep = finalQuestions.length;
            renderSummary();
        }
    }

    function goNext() {
        vibe('medium');
        
        if (currentStep === -1) {
            const nameInp = document.getElementById('clientName'); const areaInp = document.getElementById('clientArea'); let hasError = false;
            [nameInp, areaInp].forEach(inp => inp.classList.remove('input-error'));
            if (!nameInp.value.trim()) { nameInp.classList.add('input-error'); hasError = true; }
            if (!areaInp.value.trim() || parseFloat(areaInp.value) <= 0) { areaInp.classList.add('input-error'); hasError = true; }

            if (hasError) { vibeError(); tg.showAlert("Будь ласка, заповніть обов'язкові поля (Ім'я та Площу)!"); return; }
            
            buildFullQuestionsList(); triggerLiveCalc(); 
            document.getElementById('btnBack').style.display = 'block'; 
            
            if (isEditingFromSummary) { routeToNextUnansweredOrSummary(); return; }
            currentStep = 0; renderQuestion(); return;
        }
        
        if (currentStep >= finalQuestions.length) { finishSurvey(); return; }

        if (isEditingFromSummary) { routeToNextUnansweredOrSummary(); return; }

        let nextStep = currentStep + 1; while(nextStep < finalQuestions.length && shouldSkip(finalQuestions[nextStep])) { nextStep++; }
        if (nextStep < finalQuestions.length) { 
            currentStep = nextStep; 
            if (finalQuestions[currentStep].type === 'trigger_meas') renderMeasurements(); else renderQuestion(); 
        } else { 
            currentStep = finalQuestions.length; renderSummary(); 
        }
    }

    function goBack() {
        vibe('light');
        
        if (isEditingFromSummary) {
            isEditingFromSummary = false; currentStep = finalQuestions.length; renderSummary(); return;
        }
        
        if (currentStep === finalQuestions.length) {
            let prevStep = finalQuestions.length - 1;
            while(prevStep >= 0 && shouldSkip(finalQuestions[prevStep])) { prevStep--; }
            currentStep = prevStep; document.getElementById('btnNext').classList.remove('btn-submit');
            if (finalQuestions[currentStep].type === 'trigger_meas') { renderMeasurements(); } else { renderQuestion(); }
            return;
        }

        let prevStep = currentStep - 1; while(prevStep >= 0 && shouldSkip(finalQuestions[prevStep])) { prevStep--; }
        if (prevStep >= 0) { 
            currentStep = prevStep; 
            if (finalQuestions[currentStep].type === 'trigger_meas') renderMeasurements(); else renderQuestion(); 
        } else { 
            currentStep = -1; document.getElementById('btnBack').style.display = 'none'; updateNextButton(); showSection('section-client');
        }
    }

                    <div style="font-weight:600; font-size:14px;">${cw.name || 'Без назви'} <span style="font-size:12px; font-weight:normal; color:var(--hint-color);">(${cw.zone})</span></div>
                    <div style="font-size:12px; color:var(--hint-color); margin-top:2px;">Тип: ${cw.calc_type}</div>
                    <div style="font-size:13px; margin-top:2px;">Робота: ${cw.work_price} ₴ | Матеріал: ${cw.mat_price} ₴</div>
                </div>`;
            });
        } else {
            html += `<div style="font-size:13px; color:var(--hint-color);">Не додано жодної кастомної роботи.</div>`;
        }
        html += `</div>`;
        
        html += `<div class="summary-box" style="background: rgba(52, 199, 89, 0.1); border-color: #34c759;">
                    <div style="text-align: center; color: #34c759; font-weight: 700; font-size: 16px; margin-bottom: 5px;">ВАРТІСТЬ ЗАРАЗ</div>
                    <div style="display: flex; justify-content: space-around;">
                        <div style="text-align: center;"><div style="font-size: 12px; color: var(--text-color);">Робота</div><div style="font-weight: 800; font-size: 18px; color: var(--text-color);" id="summary-total-work">${currentTotalWork.toLocaleString()} ₴</div></div>
                        <div style="text-align: center;"><div style="font-size: 12px; color: var(--text-color);">Матеріали (від)</div><div style="font-weight: 800; font-size: 18px; color: var(--text-color);" id="summary-total-mat">${currentTotalMat.toLocaleString()} ₴</div></div>
                    </div></div>`;
        container.innerHTML = html;
    }

    function finishSurvey() {
        vibe('heavy');
        localStorage.removeItem('remont_draft_' + (editId || 'new')); 
        document.getElementById('navBar').style.display = 'none'; 
        showSection('section-thankyou');
        const thx = document.getElementById('section-thankyou'); thx.innerHTML = '<div class="check-icon animated-step">✅</div><h3 class="animated-step">Зберігаємо...</h3><p class="animated-step" style="color: var(--hint-color);">Зачекайте мить.</p>';
        const data = { edit_id: editId, client: { name: document.getElementById('clientName').value, phone: document.getElementById('clientPhone').value, object_type: document.getElementById('objectType').value, address: document.getElementById('clientAddress').value, area: document.getElementById('clientArea').value, floor: document.getElementById('clientFloor').value, elevator: document.getElementById('clientElevator').value }, answers: answers };
        if (editId) { if (navigator.onLine) { fetch(`${BACKEND_URL}/api/save_order`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify(data) }).then(res => { if (!res.ok) throw new Error("Помилка сервера"); tg.close(); }).catch(() => queueOffline(data)); } else { queueOffline(data); } } else { tg.sendData(JSON.stringify(data)); }
    }

    function queueOffline(data) { let q = JSON.parse(localStorage.getItem('remont_offline_q') || '[]'); q.push({ data: data, initData: tg.initData }); localStorage.setItem('remont_offline_q', JSON.stringify(q)); tg.showAlert("📡 Немає інтернету! Дані збережено на телефоні. Вони відправляться автоматично, коли з'явиться мережа."); tg.close(); }

    async function syncOfflineQueue() {
        if (!navigator.onLine) return; let q = JSON.parse(localStorage.getItem('remont_offline_q') || '[]'); if (q.length === 0) return; let remaining = [];
        for (let item of q) { try { const res = await fetch(`${BACKEND_URL}/api/save_order`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': item.initData }, body: JSON.stringify(item.data) }); if (!res.ok) throw new Error("Fail"); } catch(e) { remaining.push(item); } }
        if (remaining.length < q.length) { tg.showAlert("✅ Зв'язок відновлено. Відкладені заявки відправлені!"); } localStorage.setItem('remont_offline_q', JSON.stringify(remaining));
    }
    window.addEventListener('online', syncOfflineQueue);

    function saveDraft() {
        if (!document.getElementById('section-thankyou').classList.contains('hidden')) return;
        const draftData = { currentStep: currentStep, answers: answers, client: { name: document.getElementById('clientName').value, phone: document.getElementById('clientPhone').value, object_type: document.getElementById('objectType').value, address: document.getElementById('clientAddress').value, area: document.getElementById('clientArea').value, floor: document.getElementById('clientFloor').value, elevator: document.getElementById('clientElevator').value } };
        localStorage.setItem('remont_draft_' + (editId || 'new'), JSON.stringify(draftData));
    }
    setInterval(saveDraft, 2000);

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('edit_id')) {
        editId = urlParams.get('edit_id'); const savedDraft = localStorage.getItem('remont_draft_' + editId);
        if (savedDraft) { tg.showConfirm("У вас є незбережена чернетка. Відновити?", function(restored) { if(restored) applyDraft(savedDraft); else { localStorage.removeItem('remont_draft_' + editId); loadEditData(); } }); } else { loadEditData(); }
    } else { syncOfflineQueue(); const savedDraft = localStorage.getItem('remont_draft_new'); if (savedDraft) { tg.showConfirm("У вас є незбережена чернетка. Відновити?", function(restored) { if(restored) applyDraft(savedDraft); else localStorage.removeItem('remont_draft_new'); }); } }

    function applyDraft(savedString) {
        try {
            const parsed = JSON.parse(savedString); document.getElementById('clientName').value = parsed.client.name || ""; document.getElementById('clientPhone').value = parsed.client.phone || ""; document.getElementById('objectType').value = parsed.client.object_type || "Квартира (Новобудова)"; document.getElementById('clientAddress').value = parsed.client.address || ""; document.getElementById('clientArea').value = parsed.client.area || ""; document.getElementById('clientFloor').value = parsed.client.floor || "1"; document.getElementById('clientElevator').value = parsed.client.elevator || "Немає";
            answers = parsed.answers || {}; currentStep = parsed.currentStep || -1; buildFullQuestionsList();
            if (currentStep > -1) { 
                document.getElementById('btnBack').style.display = 'block'; 
                triggerLiveCalc(); 
                if (currentStep >= finalQuestions.length) { renderSummary(); } 
                else if (finalQuestions[currentStep].type === 'trigger_meas') { renderMeasurements(); } 
                else { renderQuestion(); }
            }
        } catch(e) {}
    }

    async function loadEditData() {
        showSection('loading-screen');
        try {
            const res = await fetch(`${BACKEND_URL}/api/get_order?id=${editId}`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
            if (res.status === 423) { const err = await res.json(); tg.showAlert(err.error); tg.close(); return; }
            if (!res.ok) throw new Error("Server error");
            const data = await res.json(); document.getElementById('clientName').value = data.client.name || ""; document.getElementById('clientPhone').value = data.client.phone || ""; document.getElementById('objectType').value = data.client.object_type || "Квартира (Новобудова)"; document.getElementById('clientAddress').value = data.client.address || ""; document.getElementById('clientArea').value = data.client.area || ""; document.getElementById('clientFloor').value = data.client.floor || "1"; document.getElementById('clientElevator').value = data.client.elevator || "Немає";
            answers = data.answers || {}; buildFullQuestionsList(); document.getElementById('btnBack').style.display = 'block'; triggerLiveCalc(); 
            currentStep = finalQuestions.length; renderSummary();
        } catch(e) { alert("Помилка з'єднання."); showSection('section-client'); }
    }
</script>
</body>
</html>
